<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_code }} | TJ RMM</title>
    <style>
        :root {
            --page-bg: #f4f8fc;
            --surface: #ffffff;
            --line: #d9e5f2;
            --text-main: #17314d;
            --text-muted: #7088a2;
            --accent: #1d88ff;
            --accent-deep: #135fc9;
            --shadow: 0 24px 55px rgba(19, 60, 105, 0.10);
        }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(29, 136, 255, 0.15), transparent 28%),
                linear-gradient(180deg, #fbfdff 0%, #f2f7fb 60%, #edf4fb 100%);
            color: var(--text-main);
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        }
        .shell {
            width: min(760px, 92vw);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .hero {
            padding: 2rem 2rem 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #f7fbff 100%);
        }
        .code {
            display: inline-flex;
            align-items: center;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: rgba(29, 136, 255, 0.10);
            color: var(--accent-deep);
            font-weight: 700;
            letter-spacing: 0.06em;
        }
        .content {
            padding: 0 2rem 2rem;
        }
        .message {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.65;
        }
        .actions {
            display: flex;
            gap: 0.85rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 1.1rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-deep));
            color: #fff;
            box-shadow: 0 14px 28px rgba(29, 136, 255, 0.24);
        }
        .btn-secondary {
            background: #f8fbff;
            color: var(--text-main);
            border: 1px solid var(--line);
        }
        .note {
            margin-top: 1.25rem;
            padding: 1rem 1.1rem;
            background: #f8fbff;
            border: 1px solid var(--line);
            border-radius: 16px;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="hero">
            <div class="code">{{ error_code }}</div>
            <h1>{{ error_title }}</h1>
        </div>
        <div class="content">
            <p class="message">{{ error_message }}</p>
            {% block extra %}{% endblock %}
            <div class="actions">
                <a class="btn btn-primary" href="{{ action_url }}">{{ action_label }}</a>
                <a class="btn btn-secondary" href="/">Home</a>
            </div>
        </div>
    </div>
</body>
</html>
